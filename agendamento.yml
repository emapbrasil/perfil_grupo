name: Análise EMAP

on:
  # Agendamento: toda segunda-feira às 8h (horário de Brasília = 11h UTC)
  schedule:
    - cron: "0 11 * * 1"

  # Permite disparar manualmente pela aba "Actions" no GitHub
  workflow_dispatch:

jobs:
  rodar-analise:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar análise
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID:              ${{ secrets.SPREADSHEET_ID }}
          DRIVE_FOLDER_ID:             ${{ secrets.DRIVE_FOLDER_ID }}
          WORKSHEET_NAME:              ${{ vars.WORKSHEET_NAME }}   # opcional, default "Coleta"
        run: python analise.py

      - name: Fazer upload dos gráficos como artefato (backup no Actions)
        if: always()   # salva mesmo se houver erro parcial
        uses: actions/upload-artifact@v4
        with:
          name: graficos-${{ github.run_id }}
          path: graficos/
          retention-days: 30
