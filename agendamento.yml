name: Análise EMAP

on:
  # Agendamento: toda segunda-feira às 8h (horário de Brasília = 11h UTC)
  schedule:
    - cron: "0 11 * * 1"

  # Permite disparar manualmente pela aba "Actions" no GitHub
  workflow_dispatch:

# Permissão para fazer commit no repositório
permissions:
  contents: write

jobs:
  rodar-analise:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar análise
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID:              ${{ secrets.SPREADSHEET_ID }}
          WORKSHEET_NAME:              ${{ vars.WORKSHEET_NAME }}
        run: python analise.py

      - name: Commit e push dos gráficos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graficos/
          git diff --cached --quiet || git commit -m "chore: atualiza gráficos [$(date '+%Y-%m-%d')]"
          git push