name: Análise EMAP → Publicar em data-output

on:
  # Segunda-feira às 08:00 BRT (11:00 UTC)
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: write   # permite git push com GITHUB_TOKEN

# Evita execuções concorrentes mexendo na mesma branch de output
concurrency:
  group: perfil-grupo-data-output
  cancel-in-progress: true

# Parâmetros globais e lista explícita de arquivos esperados
env:
  OUTPUT_BRANCH: data-output
  OUTPUT_DIR: graficos
  MARKDOWN_FILE: analise.md
  EXPECTED_PNGS: >-
    distrib_genero.png
    febre_reumatica.png
    tempo_benzetacil.png
    imc.png
    idade_primeiros_sintomas.png
    sintomas.png
    ascendencia.png
    distribuicao_uf_barras.png
    distribuicao_uf_mapa.png
    relacao_tabagismo.png
    relacao_estresse.png
    relacao_cirurgia.png
    relacao_covid.png
    cards_resumo.png

jobs:
  run-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      ######################################################################
      # 1) Checkout do código-fonte na master (apenas para ler/gerar)
      #    - Em 'repo/' para manter isolado do checkout de output
      #    - Sem credenciais persistidas (não vamos fazer push a partir daqui)
      ######################################################################
      - name: Checkout master (fonte) em repo/
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          path: repo
          persist-credentials: false

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Executar análise (gera PNGs e Markdown)
        working-directory: repo
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          WORKSHEET_NAME: ${{ vars.WORKSHEET_NAME }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python analise.py

      # Debug: listar o que o Python produziu
      - name: Debug – listar arquivos gerados (repo/)
        run: |
          echo "==== repo/ (raiz) ===="; ls -lah repo | sed 's/^/repo: /'
          echo "==== repo/${OUTPUT_DIR} ===="; ls -lah "repo/${OUTPUT_DIR}" | sed 's/^/repo-graficos: /'

      ######################################################################
      # 2) Validação rígida: TODOS os 14 PNGs precisam existir em repo/graficos
      #    - Se faltar qualquer um, o job falha com mensagem clara
      #    - (Opcional) torne o analise.md OBRIGATÓRIO descomentando o teste
      ######################################################################
      - name: Validação rígida (repo → 14 PNGs)
        run: |
          missing=0
          for f in ${EXPECTED_PNGS}; do
            if [ ! -f "repo/${OUTPUT_DIR}/${f}" ]; then
              echo "::error file=${OUTPUT_DIR}/${f}::Arquivo esperado não gerado em repo/${OUTPUT_DIR}/${f}"
              missing=1
            fi
          done
          # Torne o analise.md obrigatório descomentando as linhas abaixo:
          # if [ ! -f "repo/${MARKDOWN_FILE}" ]; then
          #   echo "::error file=${MARKDOWN_FILE}::analise.md ausente"
          #   missing=1
          # fi
          if [ "$missing" = "1" ]; then
            echo "Um ou mais arquivos esperados não foram gerados pelo Python. Abortando."
            exit 1
          fi

      ######################################################################
      # 3) Garantir que a branch data-output exista no remoto (criação 1ª vez)
      ######################################################################
      - name: Garantir existência da branch ${{ env.OUTPUT_BRANCH }} no remoto
        run: |
          mkdir -p bare && cd bare
          git init
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch origin --depth=1 || true
          if ! git ls-remote --heads origin "${OUTPUT_BRANCH}" | grep -q "${OUTPUT_BRANCH}"; then
            echo "Criando ${OUTPUT_BRANCH} no remoto..."
            git checkout --orphan "${OUTPUT_BRANCH}"
            mkdir -p "${OUTPUT_DIR}"
            touch "${OUTPUT_DIR}/.gitkeep"
            echo "# Análise" > "${MARKDOWN_FILE}"
            git add -A
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "init ${OUTPUT_BRANCH}"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
                     "${OUTPUT_BRANCH}:${OUTPUT_BRANCH}"
          fi

      ######################################################################
      # 4) Checkout da branch data-output em 'output/' (com credenciais)
      ######################################################################
      - name: Checkout ${{ env.OUTPUT_BRANCH }} (artefatos) em output/
        uses: actions/checkout@v4
        with:
          ref: ${{ env.OUTPUT_BRANCH }}
          fetch-depth: 0
          path: output
          persist-credentials: true

      - name: Configurar Git (output/)
        working-directory: output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/output"

      ######################################################################
      # 5) Sincronização TOTAL: apaga e recopia graficos/ + copia analise.md (se existir)
      ######################################################################
      - name: Sincronizar graficos/ e analise.md para a branch de output
        run: |
          # Zera diretório de gráficos e recopia TUDO gerado pelo Python
          rm -rf "output/${OUTPUT_DIR}"
          mkdir -p "output/${OUTPUT_DIR}"
          cp -r "repo/${OUTPUT_DIR}/." "output/${OUTPUT_DIR}/"

          # Copia analise.md se existir (opcional; para obrigar, use validação acima)
          if [ -f "repo/${MARKDOWN_FILE}" ]; then
            cp "repo/${MARKDOWN_FILE}" "output/${MARKDOWN_FILE}"
          fi

      - name: Debug – listar arquivos prontos para commit (output/)
        run: |
          echo "==== output/${OUTPUT_DIR} ===="; ls -lah "output/${OUTPUT_DIR}" | sed 's/^/output-graficos: /'
          if [ -f "output/${MARKDOWN_FILE}" ]; then
            echo "==== output/${MARKDOWN_FILE} ===="; wc -l "output/${MARKDOWN_FILE}" || true
