name: Análise → Atualiza branch data-output

on:
  schedule:
    - cron: "0 11 * * 1"   # 08:00 BRT (11:00 UTC) toda segunda
  workflow_dispatch:

permissions:
  contents: write   # necessário para permitir git push com GITHUB_TOKEN

concurrency:
  group: perfil-grupo-data-output
  cancel-in-progress: true

env:
  OUTPUT_BRANCH: data-output
  OUTPUT_DIR: graficos
  MARKDOWN_FILE: analise.md

jobs:
  run-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1) Checkout do código-fonte na master (somente leitura/execução)
      - name: Checkout master (fonte)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          path: repo
          # credenciais não são necessárias para leitura aqui
          persist-credentials: false

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        working-directory: repo
        run: pip install -r requirements.txt

      - name: Executar análise (gera PNGs e Markdown)
        working-directory: repo
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          WORKSHEET_NAME: ${{ vars.WORKSHEET_NAME }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python analise.py

      # 2) Garantir que a branch data-output exista (se não existir, cria)
      - name: Preparar repositório "nu" para criar branch de output (se precisar)
        run: |
          mkdir -p bare && cd bare
          git init
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch origin --depth=1 || true
          # Se a data-output não existe no remoto, cria e faz push inicial
          if ! git ls-remote --heads origin "$OUTPUT_BRANCH" | grep -q "$OUTPUT_BRANCH"; then
            echo "Criando $OUTPUT_BRANCH no remoto..."
            git checkout --orphan "$OUTPUT_BRANCH"
            mkdir -p "$OUTPUT_DIR"
            touch "$OUTPUT_DIR/.gitkeep"
            echo "# Análise" > "$MARKDOWN_FILE"
            git add -A
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "init $OUTPUT_BRANCH"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
                     "$OUTPUT_BRANCH":"$OUTPUT_BRANCH"
          fi

      # 3) Checkout da branch data-output em diretório separado (com credenciais para push)
      - name: Checkout data-output (artefatos)
        id: checkout_output
        uses: actions/checkout@v4
        with:
          ref: ${{ env.OUTPUT_BRANCH }}
          fetch-depth: 0
          path: output
          persist-credentials: true   # deixa credenciais para permitir git push
          # usa por padrão o ${{ github.token }} do workflow
          # (actions/checkout documenta esse comportamento) 

      - name: Configurar Git (somente no diretório de output)
        working-directory: output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/output"

      # 4) Copiar arquivos gerados da master para a pasta de output
      - name: Copiar novas imagens e markdown
        run: |
          mkdir -p "output/${OUTPUT_DIR}"
          cp -r "repo/${OUTPUT_DIR}/." "output/${OUTPUT_DIR}/" 2>/dev/null || true
          if [ -f "repo/${MARKDOWN_FILE}" ]; then
            cp "repo/${MARKDOWN_FILE}" "output/${MARKDOWN_FILE}"
          fi

      # 5) Commit condicional
      - name: Commit (somente se houver mudanças)
        working-directory: output
        id: commit
        run: |
          git add "${OUTPUT_DIR}/" "${MARKDOWN_FILE}" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Sem mudanças para commit."
            exit 0
          fi
          git commit -m "chore(output): atualiza PNGs e análise [$(date '+%Y-%m-%d')]"
          echo "changed=true" >> $GITHUB_OUTPUT

      # 6) Push com rebase + retry (sem force)
      - name: Push para data-output (com retry)
        if: steps.commit.outputs.changed == 'true'
        working-directory: output
        run: |
          set -e
          for i in 1 2 3 4 5; do
            echo "Tentativa $i..."
            git pull --rebase --autostash origin "$OUTPUT_BRANCH" || true
            if git push origin "$OUTPUT_BRANCH"; then
              echo "Push OK."
              exit 0
            fi
            echo "Push falhou. Aguardando 5s e tentando novamente..."
            sleep 5
          done
          echo "Falha ao fazer push após múltiplas tentativas."
          exit 1 

      # 7) (Opcional) Diagnóstico em caso de erro
      - name: Diagnóstico pós-falha
        if: failure()
        run: |
          echo "=== git status (output) ===";  (cd output && git status || true)
          echo "=== branches (output) ===";   (cd output && git branch -vv || true)
          echo "=== remotes (output) ===";    (cd output && git remote -v || true)
          echo "=== últimos commits (output) ==="; (cd output && git log --oneline -5 || true)
