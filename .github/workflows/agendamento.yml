name: Análise EMAP

on:
  # Segunda-feira às 08:00 BRT (11:00 UTC)
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: write

# Evita concorrência entre runs na mesma branch
concurrency:
  group: perfil-grupo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rodar-analise:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout do repositório (branch master)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          # persist-credentials: true (padrão) -> permite git push com GITHUB_TOKEN
          # Doc do checkout: fetch-depth 0 pega histórico completo. 
          # (não mudar) 

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Rebase ANTES de gerar arquivos, para minimizar divergência
      - name: Sincronizar branch com rebase
        run: |
          git fetch origin master
          git checkout master
          git pull --rebase --autostash origin master

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar análise
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          WORKSHEET_NAME: ${{ vars.WORKSHEET_NAME }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python analise.py

      - name: Preparar commit (somente se houver mudanças)
        id: prep-commit
        run: |
          set -e
          git add graficos/ analise.md || true
          if git diff --cached --quiet; then
            echo "nothing_to_commit=true" >> $GITHUB_OUTPUT
            echo "Sem mudanças para commit."
            exit 0
          fi
          git commit -m "chore: atualiza gráficos e análise [$(date '+%Y-%m-%d')]"
          echo "nothing_to_commit=false" >> $GITHUB_OUTPUT

      - name: Pull rebase e push (sem force) com retry
        if: steps.prep-commit.outputs.nothing_to_commit == 'false'
        run: |
          set -e
          for i in 1 2 3 4 5; do
            echo "Tentativa $i..."
            # Integra qualquer novo commit remoto antes do push:
            git pull --rebase --autostash origin master || true
            # Tenta push normal (fast-forward). Sem --force:
            if git push origin master; then
              echo "Push OK na tentativa $i."
              exit 0
            fi
            echo "Push falhou (provável novo commit remoto). Aguardando 5s..."
            sleep 5
          done
          echo "Falha ao fazer push após múltiplas tentativas."
          exit 1
``